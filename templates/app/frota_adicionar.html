{% extends "app/base_app.html" %}

{% block title %}Novo Veículo - Hibiro 2026{% endblock %}
{% block page_title %}Adicionar à Frota{% endblock %}

{% block content %}

<div class="stat-card" style="max-width: 900px; margin: 0 auto;">
    <h3 style="margin-top: 0; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">📋 Detalhes do Novo Veículo</h3>
    
    <form method="POST" action="{{ url_for('frota.adicionar_veiculo') }}">
        
        <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 25px;">
            
            <div style="flex: 1; min-width: 250px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: var(--text-muted);">Placa</label>
                <input type="text" name="placa" class="input-standard" placeholder="Ex: ABC-1234" required style="text-transform: uppercase;">
            </div>

            <div style="flex: 1; min-width: 250px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: var(--text-muted);">Modelo do Veículo</label>
                <select name="id_modelo" class="input-standard" required>
                    <option value="">Selecione um modelo...</option>
                    {% for mo in modelos %}
                        <option value="{{ mo.id_modelo }}">{{ mo.nome_modelo }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="flex: 1; min-width: 250px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: var(--text-muted);">Tipo da Carroceria</label>
                <select name="id_tipo" class="input-standard" required>
                    <option value="">Selecione o tipo...</option>
                    {% for t in tipos %}
                        <option value="{{ t.id_tipo }}">{{ t.nome_tipo }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="flex: 1; min-width: 250px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: var(--text-muted);">Data de Aquisição</label>
                <input type="date" name="data_aquisicao" class="input-standard" required>
            </div>

            <div style="flex: 1; min-width: 250px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: var(--text-muted);">Valor Inicial (R$)</label>
                <input type="number" step="0.01" name="valor_aquisicao" class="input-standard" placeholder="0.00" required>
            </div>

        </div>

        <div style="border-top: 1px solid var(--border); padding-top: 20px; display: flex; justify-content: flex-end; gap: 15px;">
            <a href="{{ url_for('frota.lista_frota') }}" style="padding: 12px 25px; border-radius: 8px; text-decoration: none; color: var(--text-main); font-weight: bold; background-color: transparent; border: 1px solid var(--border);">
                Cancelar
            </a>
            <button type="submit" style="background-color: var(--accent); color: white; border: none; padding: 12px 35px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 10px rgba(67, 24, 255, 0.2);">
                💾 Salvar Veículo
            </button>
        </div>

    </form>
</div>

{% endblock %}
