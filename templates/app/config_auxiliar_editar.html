{% extends "base_app.html" %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-xl border border-slate-200 dark:border-slate-700">
        <div class="flex items-center gap-3 mb-8 pb-4 border-b border-slate-100 dark:border-slate-700">
            <div class="p-2 bg-blue-100 dark:bg-blue-500/10 rounded-lg text-blue-600">
                <i class="fa-solid fa-pen-nib text-xl"></i>
            </div>
            <div>
                <h3 class="text-lg font-black text-slate-800 dark:text-white uppercase tracking-tighter">
                    Editar {{ titulo }}
                </h3>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">ID #{{ registro[col_id] }}</p>
            </div>
        </div>
        
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Descrição do Registro</label>
                <input type="text" name="nome_registro" value="{{ registro[col_nome] }}" required 
                    class="w-full p-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition text-sm font-bold uppercase">
            </div>

            <div class="flex items-center justify-end gap-3 pt-4">
                <a href="{{ url_for('configuracoes.config_auxiliar', slug=slug) }}" 
                   class="px-6 py-3 text-[10px] font-black text-slate-400 uppercase hover:text-slate-600 transition tracking-widest">
                    Cancelar
                </a>
                <button type="submit" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-black px-8 py-3 rounded-2xl shadow-lg shadow-blue-500/20 transition transform hover:-translate-y-0.5 uppercase text-[10px] tracking-widest">
                    💾 Atualizar Nome
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
