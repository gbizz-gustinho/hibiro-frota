{% extends "base_app.html" %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
    <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700">
        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">🚚 Veículos Ativos</h3>
        <p class="text-4xl font-extrabold text-blue-600 dark:text-blue-400">{{ total_veiculos }}</p>
        <div class="mt-4 flex items-center text-xs text-green-500 font-bold">
            <i class="fa-solid fa-check-double mr-1"></i> Operação Normal
        </div>
    </div>

    <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700">
        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">👤 Equipe</h3>
        <p class="text-4xl font-extrabold text-indigo-600 dark:text-indigo-400">{{ total_motoristas }}</p>
        <p class="mt-4 text-xs text-slate-500">Motoristas registrados</p>
    </div>

    <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700">
        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">⚠️ Alertas</h3>
        <p class="text-4xl font-extrabold text-amber-500">0</p>
        <p class="mt-4 text-xs text-slate-500">Manutenções preventivas</p>
    </div>
</div>

<div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700">
        <h4 class="text-sm font-bold mb-6 text-center">Distribuição de Carroceria</h4>
        <div class="h-64"><canvas id="chartTipos"></canvas></div>
    </div>

    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700">
        <h4 class="text-sm font-bold mb-6 text-center">Veículos por Marca</h4>
        <div class="h-64"><canvas id="chartMarcas"></canvas></div>
    </div>
</div>
{% endblock %}
