{% extends "base_app.html" %}

{% block title %}Editar Tipo de Veículo - Hibiro 2026{% endblock %}
{% block page_title %}Editar Carroceria/Tipo{% endblock %}

{% block content %}
<div class="stat-card" style="max-width: 600px; margin: 0 auto;">
    <h3 style="margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
        ✏️ Editar Tipo #{{ tipo.id_tipo }}
    </h3>
    
    <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">
        
        <div>
            <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: var(--text-muted);">Nome do Tipo/Carroceria</label>
            <input type="text" name="nome_tipo" value="{{ tipo.nome_tipo }}" class="input-standard" required style="width: 100%;">
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 10px;">
            <a href="{{ url_for('configuracoes.config_tipo_veiculo') }}" style="padding: 12px 25px; border-radius: 8px; text-decoration: none; color: var(--text-main); font-weight: bold; border: 1px solid var(--border);">
                Cancelar
            </a>
            <button type="submit" style="background-color: #f1c40f; color: #000; border: none; padding: 12px 35px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;">
                💾 Atualizar
            </button>
        </div>
    </form>
</div>
{% endblock %}
