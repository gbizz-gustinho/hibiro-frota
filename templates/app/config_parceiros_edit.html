{% extends "base_app.html" %}

{% block title %}Editar Parceiro - Hibiro 2026{% endblock %}
{% block page_title %}Editar Cadastro{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-700">
        <div class="flex items-center gap-3 mb-8 pb-4 border-b border-slate-100 dark:border-slate-700">
            <div class="p-2 bg-amber-100 dark:bg-amber-500/10 rounded-lg text-amber-600">
                <i class="fa-solid fa-user-pen text-xl"></i>
            </div>
            <div>
                <h3 class="text-lg font-black text-slate-800 dark:text-white uppercase tracking-tighter">
                    Editar Parceiro
                </h3>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Registro ID #{{ parceiro.id_clifor }}</p>
            </div>
        </div>
        
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Nome Completo / Empresa</label>
                <input type="text" name="nome_clifor" value="{{ parceiro.nome_clifor }}" required 
                    class="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition text-sm font-bold uppercase">
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Tipo de Vínculo</label>
                <select name="tipo_clifor" required 
                    class="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition text-sm font-bold appearance-none cursor-pointer">
                    <option value="MOTORISTA" {% if parceiro.tipo_clifor == 'MOTORISTA' %}selected{% endif %}>MOTORISTA</option>
                    <option value="FORNECEDOR" {% if parceiro.tipo_clifor == 'FORNECEDOR' %}selected{% endif %}>FORNECEDOR (OFICINA/POSTO)</option>
                </select>
            </div>

            <div class="flex items-center justify-end gap-3 pt-4">
                <a href="{{ url_for('configuracoes.config_parceiros') }}" 
                   class="px-6 py-2.5 text-[10px] font-black text-slate-400 uppercase hover:text-slate-600 transition tracking-widest">
                    Cancelar
                </a>
                <button type="submit" 
                    class="bg-amber-500 hover:bg-amber-600 text-white font-black px-8 py-2.5 rounded-xl shadow-lg shadow-amber-500/20 transition uppercase text-[10px] tracking-widest">
                    💾 Atualizar Registro
                </button>
            </div>
        </form>
    </div>
</div>
<script src="https://unpkg.com/imask"></script>
<script>
    // Aplica máscara dinâmica (CPF ou CNPJ)
    const element = document.querySelector('input[name="cpf_cnpj"]');
    if (element) {
        const maskOptions = {
            mask: [
                { mask: '000.000.000-00' },
                { mask: '00.000.000/0000-00' }
            ]
        };
        IMask(element, maskOptions);
    }

    // Auto-focus no campo de nome ao carregar
    window.onload = () => {
        const inputNome = document.querySelector('input[name="nome_clifor"]');
        if (inputNome) inputNome.focus();
    }
</script>

{% endblock %}
