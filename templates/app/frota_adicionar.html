{% extends "base_app.html" %}

{% block title %}Novo Veículo - Hibiro 2026{% endblock %}
{% block page_title %}Adicionar à Frota{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-gray-100 dark:border-slate-700 overflow-hidden">
    <div class="bg-slate-50 dark:bg-slate-900/50 p-6 border-b border-gray-100 dark:border-slate-700">
        <h3 class="text-xl font-bold flex items-center gap-2 text-gray-800 dark:text-white">
            <i class="fa-solid fa-clipboard-list text-blue-500"></i> Detalhes do Novo Veículo
        </h3>
    </div>
    
    <form method="POST" action="{{ url_for('frota.adicionar_veiculo') }}" class="p-8 space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Placa</label>
                <input type="text" name="placa" placeholder="ABC-1234" required 
                    class="w-full p-3 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition uppercase font-mono text-lg">
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Modelo do Veículo</label>
                <select name="id_modelo" required class="w-full p-3 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition appearance-none cursor-pointer">
                    <option value="">Selecione um modelo...</option>
                    {% for mo in modelos %}
                        <option value="{{ mo.id_modelo }}">{{ mo.nome_modelo }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Tipo da Carroceria</label>
                <select name="id_tipo" required class="w-full p-3 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition cursor-pointer">
                    <option value="">Selecione o tipo...</option>
                    {% for t in tipos %}
                        <option value="{{ t.id_tipo }}">{{ t.nome_tipo }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Data de Aquisição</label>
                <input type="date" name="data_aquisicao" required 
                    class="w-full p-3 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Valor Inicial (R$)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">R$</span>
                    <input type="number" step="0.01" name="valor_aquisicao" placeholder="0.00" required 
                        class="w-full pl-12 pr-4 py-3 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
            </div>
        </div>

        <div class="pt-8 border-t border-gray-100 dark:border-slate-700 flex justify-end gap-4">
            <a href="{{ url_for('frota.lista_frota') }}" 
               class="px-6 py-3 border border-gray-200 dark:border-slate-700 text-gray-500 dark:text-gray-400 font-bold rounded-xl hover:bg-gray-50 dark:hover:bg-slate-700/50 transition">
                Cancelar
            </a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-10 py-3 rounded-xl shadow-lg shadow-blue-500/30 transition transform hover:-translate-y-0.5 active:scale-95">
                💾 Salvar Veículo
            </button>
        </div>
    </form>
</div>
{% endblock %}
