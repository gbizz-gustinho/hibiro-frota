{% extends "base_site.html" %}

{% block content %}
<section class="h-[calc(100vh-100px)] flex flex-col lg:flex-row items-center justify-center gap-12 py-10 px-4 md:px-10">
    
    <div class="flex-1 text-center space-y-6 flex flex-col items-center">
        <h1 class="text-4xl md:text-6xl font-extrabold text-blue-600 dark:text-blue-400 leading-tight
                   [text-shadow:0_1px_1px_rgba(59,130,246,0.1)] dark:[text-shadow:none]">
            O Futuro da Gestão de Frotas na Palma da Sua Mão
        </h1>
        <p class="text-lg md:text-xl text-gray-600 dark:text-gray-400 max-w-2xl mx-auto">
            Otimize rotas, controle gastos e monitore seus veículos em tempo real com a tecnologia Hibiro 2026.
        </p>
    </div>
    
    <div class="flex-1 w-full max-w-2xl flex items-center justify-center lg:justify-end">
        <div class="relative w-full rounded-3xl overflow-hidden 
                    shadow-[0_20px_50px_rgba(59,130,246,0.12)] dark:shadow-[0_20px_50px_rgba(0,0,0,0.5)]
                    ring-1 ring-slate-200/50 dark:ring-slate-800/50
                    transition duration-500 hover:shadow-blue-500/20">
            <video autoplay muted loop playsinline class="w-full h-full object-cover">
                <source src="{{ url_for('static', filename='video/hibiro.mp4') }}" type="video/mp4">
                Seu navegador não suporta a tag de vídeo.
            </video>
            <div class="absolute inset-0 bg-blue-600/5 dark:bg-slate-900/10 pointer-events-none"></div>
        </div>
    </div>
</section>
{% endblock %}
