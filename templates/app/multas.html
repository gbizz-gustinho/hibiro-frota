{% extends "base_app.html" %}

{% block title %}Multas - Hibiro 2026{% endblock %}
{% block page_title %}Configurações de Multas{% endblock %}

{% block content %}
<div class="space-y-8 pb-10">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border border-gray-100 dark:border-slate-700">
        <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
            <i class="fa-solid fa-building-shield text-indigo-500"></i> Órgão Emissor
        </h3>
        <form method="POST" action="{{ url_for('configuracoes.config_orgao_emissor') }}" class="flex flex-col sm:flex-row gap-4 mb-6">
            <input type="text" name="nome_orgao" placeholder="Ex: DETRAN, PRF, DNIT..." required 
                class="flex-1 p-3 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition uppercase">
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-10 rounded-xl transition">
                Adicionar Órgão
            </button>
        </form>
    </div>

    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border border-gray-100 dark:border-slate-700">
        <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
            <i class="fa-solid fa-triangle-exclamation text-amber-500"></i> Gravidade da Infração
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="p-4 border border-gray-200 dark:border-slate-700 rounded-2xl bg-slate-50 dark:bg-slate-900/40">
                <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs font-black uppercase">Leve</span>
                <p class="mt-2 text-sm text-gray-500">3 Pontos</p>
            </div>
            <div class="p-4 border border-gray-200 dark:border-slate-700 rounded-2xl bg-slate-50 dark:bg-slate-900/40">
                <span class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded text-xs font-black uppercase">Média</span>
                <p class="mt-2 text-sm text-gray-500">4 Pontos</p>
            </div>
            <div class="p-4 border border-gray-200 dark:border-slate-700 rounded-2xl bg-slate-50 dark:bg-slate-900/40">
                <span class="px-2 py-1 bg-orange-100 text-orange-700 rounded text-xs font-black uppercase">Grave</span>
                <p class="mt-2 text-sm text-gray-500">5 Pontos</p>
            </div>
            <div class="p-4 border border-gray-200 dark:border-slate-700 rounded-2xl bg-slate-50 dark:bg-slate-900/40">
                <span class="px-2 py-1 bg-red-100 text-red-700 rounded text-xs font-black uppercase">Gravíssima</span>
                <p class="mt-2 text-sm text-gray-500">7 Pontos</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
