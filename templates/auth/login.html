{% extends "base_site.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full space-y-8 bg-white dark:bg-slate-800 p-10 rounded-3xl shadow-2xl border-4 border-gray-100 dark:border-slate-700 relative overflow-hidden">
        
        <div class="text-center">
            <img class="mx-auto h-16 w-auto" src="{{ url_for('static', filename='img/hibiro150transp.png') }}" alt="Logo Hibiro">
            <h2 class="mt-6 text-3xl font-black text-gray-900 dark:text-white uppercase tracking-tighter">
                <span class="text-blue-600">BEM-VINDO</span> 
                <span class="text-amber-400 drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">AO HIBIRO 2026</span>
            </h2>
        </div>

        <div id="loginSection" class="space-y-6">
            <form class="mt-8 space-y-6" action="{{ url_for('auth.login') }}" method="POST">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-black text-blue-600 dark:text-blue-300 mb-2 uppercase tracking-widest">E-mail</label>
                        <input type="email" name="email" required 
                            class="w-full p-4 bg-gray-100 dark:bg-slate-700 border-2 border-gray-200 dark:border-slate-500 rounded-xl text-gray-900 dark:text-white font-black focus:ring-4 focus:ring-blue-500 outline-none transition" 
                            placeholder="SEU@EMAIL.COM">
                    </div>
                    <div>
                        <label class="block text-sm font-black text-blue-600 dark:text-blue-300 mb-2 uppercase tracking-widest">Senha</label>
                        <input type="password" name="senha" required 
                            class="w-full p-4 bg-gray-100 dark:bg-slate-700 border-2 border-gray-200 dark:border-slate-500 rounded-xl text-gray-900 dark:text-white font-black focus:ring-4 focus:ring-blue-500 outline-none transition" 
                            placeholder="********">
                    </div>
                </div>

                <button type="submit" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-black text-xl rounded-2xl shadow-xl transition transform hover:scale-[1.02] uppercase tracking-widest">
                    Entrar no Painel
                </button>
            </form>

            <div class="pt-4 border-t border-slate-100 dark:border-slate-700">
                <a href="{{ url_for('auth.acesso_direto') }}" 
                   class="w-full flex items-center justify-center gap-3 py-4 bg-amber-500 hover:bg-amber-600 text-slate-900 font-black rounded-2xl transition transform hover:scale-[1.02] uppercase tracking-tighter shadow-lg shadow-amber-500/20">
                    <i class="fa-solid fa-screwdriver-wrench"></i> 
                    Entrar Direto (Dev Mode)
                </a>
            </div>

            <p class="text-center text-sm text-gray-600 dark:text-gray-300 font-bold">
                Ainda não tem conta? 
                <button onclick="switchForm('register')" class="font-black text-blue-600 dark:text-blue-400 hover:underline">Cadastre-se</button>
            </p>
        </div>

        <div id="registerSection" class="hidden space-y-6">
            <h3 class="text-2xl font-black text-center text-gray-800 dark:text-white uppercase">CRIAR NOVA CONTA</h3>
            <form class="space-y-4" action="{{ url_for('auth.register') }}" method="POST">
                <input type="text" name="nome" placeholder="NOME COMPLETO" required 
                    class="w-full p-4 bg-gray-100 dark:bg-slate-700 border-2 border-gray-200 dark:border-slate-500 rounded-xl text-gray-900 dark:text-white font-black outline-none focus:ring-4 focus:ring-blue-500">
                
                <input type="email" name="email" placeholder="E-MAIL" required 
                    class="w-full p-4 bg-gray-100 dark:bg-slate-700 border-2 border-gray-200 dark:border-slate-500 rounded-xl text-gray-900 dark:text-white font-black outline-none focus:ring-4 focus:ring-blue-500">
                
                <input type="password" name="senha" placeholder="CRIE UMA SENHA" required 
                    class="w-full p-4 bg-gray-100 dark:bg-slate-700 border-2 border-gray-200 dark:border-slate-500 rounded-xl text-gray-900 dark:text-white font-black outline-none focus:ring-4 focus:ring-blue-500">
                
                <button type="submit" class="w-full py-5 bg-green-600 hover:bg-green-700 text-white font-black text-xl rounded-2xl shadow-xl transition transform hover:scale-[1.02] uppercase">
                    Finalizar Cadastro
                </button>
            </form>
            
            <p class="text-center text-sm text-gray-600 dark:text-gray-300 font-bold">
                Já possui conta? 
                <button onclick="switchForm('login')" class="font-black text-blue-600 dark:text-blue-400 hover:underline">Fazer Login</button>
            </p>
        </div>
    </div>
</div>

<script>
    function switchForm(type) {
        const login = document.getElementById('loginSection');
        const register = document.getElementById('registerSection');
        if (type === 'register') {
            login.classList.add('hidden');
            register.classList.remove('hidden');
        } else {
            register.classList.add('hidden');
            login.classList.remove('hidden');
        }
    }
</script>
{% endblock %}
