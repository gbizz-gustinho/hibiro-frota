{% extends "base_app.html" %}

{% block content %}
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700 overflow-hidden">
    <div class="p-6 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center">
        <h3 class="text-lg font-bold text-gray-800 dark:text-white">🚘 Modelos Registrados</h3>
        <span class="text-xs font-bold text-blue-500 bg-blue-50 dark:bg-blue-900/20 px-3 py-1 rounded-lg">
            {{ modelos|length }} Modelos
        </span>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead class="bg-gray-50 dark:bg-slate-900/50 text-gray-500 dark:text-gray-400 text-xs uppercase font-bold">
                <tr>
                    <th class="px-6 py-4">Marca</th>
                    <th class="px-6 py-4">Modelo</th>
                    <th class="px-6 py-4 text-right">Ações</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 dark:divide-slate-700">
                {% for mo in modelos %}
                <tr class="hover:bg-gray-50 dark:hover:bg-slate-700/30 transition group">
                    <td class="px-6 py-4">
                        <span class="text-xs font-black text-blue-600 dark:text-blue-400 bg-blue-100 dark:bg-blue-900/40 px-2 py-0.5 rounded uppercase">
                            {{ mo.nome_marca }}
                        </span>
                    </td>
                    <td class="px-6 py-4 font-bold text-gray-700 dark:text-white">{{ mo.nome_modelo }}</td>
                    <td class="px-6 py-4 text-right">
                        </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
