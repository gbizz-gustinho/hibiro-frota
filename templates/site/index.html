{% extends "site/base_site.html" %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
{% endblock %}

{% block content %}
<section class="hero">
    <div class="hero-content">
        <h1>O Futuro da Gestão de Frotas na Palma da Sua Mão</h1>
        <p>Otimize rotas, controle gastos e monitore seus veículos em tempo real.</p>
        
        <a href="{{ url_for('auth.login') }}" class="cta-primary">Experimente Grátis</a>
    </div>
    
    <div class="hero-image">
        <video autoplay muted loop playsinline class="app-video">
            <source src="{{ url_for('static', filename='video/hibiro.mp4') }}" type="video/mp4">
        </video>
    </div>
</section>
{% endblock %}
