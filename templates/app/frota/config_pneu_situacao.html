{% extends "base_app.html" %}
{% block page_title %}Situações de Pneu{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
        <h3 class="text-lg font-black uppercase tracking-tighter mb-4 text-emerald-500">Nova Situação (Ex: Novo, Recapado)</h3>
        <form method="POST" action="{{ url_for('config_frota.pneu_situacao') }}" class="flex gap-4">
            <input type="text" name="nome_situacao" placeholder="EX: NOVO, RECAPADO, USADO..." required
                class="flex-grow p-3 rounded-xl bg-slate-100 dark:bg-slate-900 border-none focus:ring-2 focus:ring-emerald-500 outline-none font-bold uppercase text-sm text-slate-700 dark:text-white">
            <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-black transition-all shadow-lg text-xs">
                ADICIONAR
            </button>
        </form>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
                    <th class="px-6 py-4 text-[10px] font-black uppercase text-slate-400 tracking-widest">ID</th>
                    <th class="px-6 py-4 text-[10px] font-black uppercase text-slate-400 tracking-widest">Descrição</th>
                    <th class="px-6 py-4 text-right text-[10px] font-black uppercase text-slate-400 tracking-widest">Ações</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 dark:divide-slate-700">
                {% for s in situacoes %}
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-900/30 transition-colors">
                    <td class="px-6 py-4 text-xs font-bold text-slate-400">#{{ s.id_situacao }}</td>
                    <td class="px-6 py-4 text-sm font-black text-slate-700 dark:text-slate-200 uppercase">{{ s.nome_situacao }}</td>
                    <td class="px-6 py-4 text-right">
                        <button class="p-2 text-slate-400 hover:text-blue-500 transition-colors"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="p-2 text-slate-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="px-6 py-10 text-center text-slate-400 text-xs font-bold uppercase italic">Nenhuma situação cadastrada.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
