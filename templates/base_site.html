<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hibiro - Gestão de Frotas{% endblock %}</title>
    
    <style>
        html { background-color: #1e1e1e; color: #ffffff; }
        html:not(.dark) { background-color: #f8fafc; color: #0f172a; }
        body { opacity: 0; transition: opacity 0.3s ease-in; }
        body.loaded { opacity: 1; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3e3e42; border-radius: 10px; }
    </style>

    <script>
        (function() {
            const theme = localStorage.getItem('theme-site') || 'dark';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        vscode: { 
                            sidebar: '#252526', 
                            main: '#1e1e1e', 
                            header: '#323233', 
                            active: '#37373d' 
                        }
                    }
                }
            }
        }
    </script>
    {% block extra_css %}{% endblock %} 
</head>
<body class="h-full bg-slate-50 dark:bg-vscode-main text-slate-900 dark:text-slate-100 transition-colors duration-300 overflow-hidden">

    <div id="sidebarOverlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

    <div class="flex h-full overflow-hidden">
        
        <aside id="sidebar" 
            class="fixed inset-y-0 left-0 z-50 w-64 transform -translate-x-full transition-all duration-300 
                    md:relative md:translate-x-0 md:w-20 md:hover:w-64 group 
                    bg-white dark:bg-slate-700 border-r border-slate-200 dark:border-slate-500 flex flex-col shadow-2xl">
            
            <div class="h-20 flex items-center justify-center border-b border-slate-100 dark:border-slate-600 overflow-hidden bg-slate-50 dark:bg-slate-800">
                <i class="fa-solid fa-truck-moving text-2xl text-amber-400 drop-shadow-md"></i>
            </div>
            
            <nav class="flex-grow overflow-y-auto py-4 space-y-2 px-3 custom-scrollbar">
                <a href="{{ url_for('site_bp.index') }}" 
                   class="flex items-center gap-4 p-3 rounded-xl transition-all text-slate-700 hover:bg-blue-50 dark:text-white dark:hover:bg-slate-600">
                    <i class="fa-solid fa-house text-xl min-w-[32px] text-center text-blue-400"></i>
                    <span class="block md:hidden md:group-hover:block whitespace-nowrap font-black tracking-wide">HOME</span>
                </a>

                <a href="{{ url_for('site_bp.funcionalidades') }}" 
                   class="flex items-center gap-4 p-3 rounded-xl transition-all text-slate-700 hover:bg-blue-50 dark:text-white dark:hover:bg-slate-600">
                    <i class="fa-solid fa-list-check text-xl min-w-[32px] text-center text-green-400"></i>
                    <span class="block md:hidden md:group-hover:block whitespace-nowrap font-black tracking-wide">FUNCIONALIDADES</span>
                </a>

                <a href="{{ url_for('site_bp.beneficios') }}" 
                   class="flex items-center gap-4 p-3 rounded-xl transition-all text-slate-700 hover:bg-blue-50 dark:text-white dark:hover:bg-slate-600">
                    <i class="fa-solid fa-award text-xl min-w-[32px] text-center text-yellow-400"></i>
                    <span class="block md:hidden md:group-hover:block whitespace-nowrap font-black tracking-wide">BENEFÍCIOS</span>
                </a>

                <a href="{{ url_for('site_bp.precos') }}" 
                   class="flex items-center gap-4 p-3 rounded-xl transition-all text-slate-700 hover:bg-blue-50 dark:text-white dark:hover:bg-slate-600">
                    <i class="fa-solid fa-tags text-xl min-w-[32px] text-center text-amber-400"></i>
                    <span class="block md:hidden md:group-hover:block whitespace-nowrap font-black tracking-wide">PREÇOS</span>
                </a>

                <a href="{{ url_for('site_bp.contato') }}" 
                   class="flex items-center gap-4 p-3 rounded-xl transition-all text-slate-700 hover:bg-blue-50 dark:text-white dark:hover:bg-slate-600">
                    <i class="fa-solid fa-envelope text-xl min-w-[32px] text-center text-purple-400"></i>
                    <span class="block md:hidden md:group-hover:block whitespace-nowrap font-black tracking-wide">CONTATO</span>
                </a>
            </nav>

            <div class="p-3 border-t border-slate-100 dark:border-slate-600">
                <button onclick="toggleTheme()" 
                        class="w-full flex items-center gap-4 p-3 rounded-xl transition-all text-slate-700 hover:bg-slate-100 dark:text-white dark:hover:bg-slate-600">
                    <i id="theme-icon" class="fa-solid fa-sun text-xl min-w-[32px] text-center text-amber-400"></i>
                    <span class="block md:hidden md:group-hover:block whitespace-nowrap font-black tracking-wide">ALTERNAR TEMA</span>
                </button>
            </div>
            
        </aside>

        <main class="flex-grow flex flex-col min-w-0 overflow-hidden">
            <header class="h-20 bg-white/80 dark:bg-vscode-header backdrop-blur-md shadow-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-6 flex-shrink-0">
                <div class="flex items-center gap-6">
                    <button onclick="toggleMobileMenu()" class="md:hidden text-slate-600 dark:text-slate-300 text-2xl hover:bg-slate-100 dark:hover:bg-slate-700 p-2 rounded-lg">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    
                    <div class="flex items-center gap-4">
                        <img src="{{ url_for('static', filename='img/hibiro150transp.png') }}" 
                             alt="Logo Hibiro" 
                             class="h-12 w-auto drop-shadow-lg transition-transform hover:scale-105">
                        <div class="hidden lg:block h-8 w-[2px] bg-slate-300 dark:bg-slate-600"></div>
                        <h2 class="hidden lg:block text-sm font-black uppercase tracking-[0.2em] text-blue-600 dark:text-blue-400">
                            SISTEMA <span class="text-amber-400">HIBIRO 2026</span>
                        </h2>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <a href="{{ url_for('auth.login') }}" class="px-5 py-2.5 border-2 border-blue-600 text-blue-600 dark:text-blue-400 rounded-xl text-xs font-black hover:bg-blue-600 hover:text-white transition-all uppercase">Login</a>
                    <a href="{{ url_for('site_bp.cadastro_teste_gratis') }}" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-xs font-black shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition-all uppercase">Teste Grátis</a>
                </div>
            </header>

            <section class="flex-grow overflow-y-auto p-4 md:p-8">
                {% block content %}{% endblock %}
                
                <footer class="mt-20 py-10 border-t border-slate-200 dark:border-slate-800 text-center text-slate-400">
                    <p class="text-[10px] font-bold uppercase tracking-widest">&copy; 2026 Hibiro. Todos os direitos reservados.</p>
                </footer>
            </section>
        </main>
    </div>

    <script>
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme-site', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme-site', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme-site') || 'dark';
            const icon = document.getElementById('theme-icon');
            
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                if(icon) icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                document.documentElement.classList.remove('dark');
                if(icon) icon.classList.replace('fa-sun', 'fa-moon');
            }

            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 50);
        });
    </script>
</body>
</html>
