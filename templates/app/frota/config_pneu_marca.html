{% extends "base_app.html" %}
{% block page_title %}Marcas de Pneus{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
        <h3 class="text-lg font-black uppercase tracking-tighter mb-4 text-cyan-500">Nova Marca de Pneu</h3>
        <form method="POST" action="{{ url_for('config_frota.pneu_marca') }}" class="flex gap-4">
            <input type="text" name="nome_marca_pneu" placeholder="EX: MICHELIN, BRIDGESTONE..." required
                class="flex-grow p-3 rounded-xl bg-slate-100 dark:bg-slate-900 border-none focus:ring-2 focus:ring-cyan-500 outline-none font-bold uppercase text-sm text-slate-700 dark:text-white">
            <button type="submit" class="bg-cyan-600 hover:bg-cyan-700 text-white px-6 py-3 rounded-xl font-black transition-all shadow-lg text-xs tracking-tighter">
                ADICIONAR
            </button>
        </form>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-50 dark:bg-slate-900/50 text-slate-500 text-xs uppercase font-bold">
                <tr>
                    <th class="px-6 py-4">ID</th>
                    <th class="px-6 py-4">Nome da Marca</th>
                    <th class="px-6 py-4 text-right">Ações</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 dark:divide-slate-700">
                {% for m in marcas %}
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition">
                    <td class="px-6 py-4 text-sm font-bold text-slate-400">#{{ m.id_marca_pneu }}</td>
                    <td class="px-6 py-4 font-black uppercase text-slate-700 dark:text-white">{{ m.nome_marca_pneu }}</td>
                    <td class="px-6 py-4 text-right flex justify-end gap-2">
                        
                        <button onclick="document.getElementById('modal-edit-pneu-{{ m.id_marca_pneu }}').classList.remove('hidden')" 
                                class="p-2 text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 rounded-lg transition">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>

                        <div id="modal-edit-pneu-{{ m.id_marca_pneu }}" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 text-left">
                            <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 w-full max-w-md shadow-2xl">
                                <h3 class="text-lg font-black uppercase text-cyan-500 mb-4">Editar Marca Pneu</h3>
                                <form action="{{ url_for('config_frota.editar_pneu_marca', id=m.id_marca_pneu) }}" method="POST" class="space-y-4">
                                    <input type="text" name="nome_marca_pneu" value="{{ m.nome_marca_pneu }}" required
                                        class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-900 border-none font-bold uppercase text-slate-700 dark:text-white focus:ring-2 focus:ring-cyan-500 outline-none">
                                    <div class="flex gap-3 pt-2">
                                        <button type="button" onclick="document.getElementById('modal-edit-pneu-{{ m.id_marca_pneu }}').classList.add('hidden')" 
                                                class="flex-1 p-3 bg-slate-200 dark:bg-slate-700 rounded-xl font-bold text-xs uppercase">Voltar</button>
                                        <button type="submit" class="flex-1 p-3 bg-cyan-600 text-white rounded-xl font-black text-xs uppercase shadow-lg">Salvar</button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <form action="{{ url_for('config_frota.excluir_pneu_marca', id=m.id_marca_pneu) }}" method="POST" onsubmit="return confirm('Excluir esta marca?');">
                            <button type="submit" class="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg transition">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
