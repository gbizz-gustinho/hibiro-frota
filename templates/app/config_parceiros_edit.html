{% extends "base_app.html" %}

{% block title %}Editar Parceiro - Hibiro 2026{% endblock %}
{% block page_title %}Editar Parceiro{% endblock %}

{% block content %}
<div class="stat-card" style="max-width: 600px; margin: 0 auto;">
    <h3 style="margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
        ✏️ Editar Parceiro #{{ parceiro.id_clifor }}
    </h3>
    
    <form method="POST" style="display: flex; flex-direction: column; gap: 20px;">
        
        <div>
            <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: var(--text-muted);">Nome Completo / Empresa</label>
            <input type="text" name="nome_clifor" value="{{ parceiro.nome_clifor }}" class="input-standard" required style="width: 100%;">
        </div>

        <div>
            <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: var(--text-muted);">Tipo de Parceiro</label>
            <select name="tipo_clifor" class="input-standard" required style="width: 100%;">
                <option value="MOTORISTA" {% if parceiro.tipo_clifor == 'MOTORISTA' %}selected{% endif %}>Motorista</option>
                <option value="FORNECEDOR" {% if parceiro.tipo_clifor == 'FORNECEDOR' %}selected{% endif %}>Fornecedor (Oficina/Posto)</option>
            </select>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 10px;">
            <a href="{{ url_for('configuracoes.config_parceiros') }}" style="padding: 12px 25px; border-radius: 8px; text-decoration: none; color: var(--text-main); font-weight: bold; border: 1px solid var(--border);">
                Cancelar
            </a>
            <button type="submit" style="background-color: #f1c40f; color: #000; border: none; padding: 12px 35px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;">
                💾 Atualizar
            </button>
        </div>
    </form>
</div>
{% endblock %}
