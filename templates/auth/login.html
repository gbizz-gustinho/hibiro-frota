{% extends "base_site.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full space-y-8 bg-white dark:bg-slate-800 p-10 rounded-3xl shadow-2xl border border-gray-100 dark:border-slate-700 relative overflow-hidden">
        
        <div class="text-center">
            <img class="mx-auto h-12 w-auto" src="{{ url_for('static', filename='img/hibiro150transp.png') }}" alt="Logo Hibiro">
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900 dark:text-white">
                <span class="text-blue-600">Bem-vindo</span> ao Hibiro 2026
            </h2>
        </div>

        <div id="loginSection" class="space-y-6">
            <form class="mt-8 space-y-4" action="{{ url_for('auth.login') }}" method="POST">
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">E-mail</label>
                    <input type="email" name="email" required 
                        class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="seu@email.com">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Senha</label>
                    <input type="password" id="loginPass" name="senha" required 
                        class="w-full p-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition transform hover:scale-[1.02]">
                    Entrar no Painel
                </button>
            </form>
            <p class="text-center text-sm text-gray-600 dark:text-gray-400">
                Ainda não tem conta? 
                <button onclick="switchForm('register')" class="font-bold text-blue-600 hover:underline">Cadastre-se</button>
            </p>
        </div>

        <div id="registerSection" class="hidden space-y-6">
            <h3 class="text-xl font-bold text-center text-gray-800 dark:text-white">Criar Nova Conta</h3>
            <form class="space-y-4" action="{{ url_for('auth.register') }}" method="POST">
                <input type="text" name="nome" placeholder="Nome Completo" required class="w-full p-3 border dark:border-slate-600 rounded-xl bg-gray-50 dark:bg-slate-900 text-white outline-none focus:ring-2 focus:ring-blue-500">
                <input type="email" name="email" placeholder="E-mail" required class="w-full p-3 border dark:border-slate-600 rounded-xl bg-gray-50 dark:bg-slate-900 text-white outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" name="senha" placeholder="Crie uma Senha" required class="w-full p-3 border dark:border-slate-600 rounded-xl bg-gray-50 dark:bg-slate-900 text-white outline-none focus:ring-2 focus:ring-blue-500">
                <button type="submit" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl transition transform hover:scale-[1.02]">
                    Finalizar Cadastro
                </button>
            </form>
            <p class="text-center text-sm text-gray-600 dark:text-gray-400">
                Já possui conta? 
                <button onclick="switchForm('login')" class="font-bold text-blue-600 hover:underline">Fazer Login</button>
            </p>
        </div>
    </div>
</div>
{% endblock %}
