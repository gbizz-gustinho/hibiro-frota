<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hibiro - Gestão de Frotas{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        vscode: { 
                            sidebar: '#252526', 
                            main: '#1e1e1e', 
                            header: '#323233', 
                            active: '#37373d' 
                        }
                    }
                }
            }
        }
    </script>
    {% block extra_css %}{% endblock %} 
</head>
<body class="h-full bg-slate-50 dark:bg-vscode-main text-slate-900 dark:text-slate-100 transition-colors duration-300 overflow-hidden">

    <div id="sidebarOverlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

    <div class="flex h-full overflow-hidden">
        
        <aside id="sidebar" 
            class="fixed inset-y-0 left-0 z-50 w-64 transform -translate-x-full transition-all duration-300 
                    md:relative md:translate-x-0 md:w-20 md:hover:w-64 group 
                    bg-white dark:bg-slate-700 border-r border-slate-200 dark:border-slate-500 flex flex-col shadow-2xl">
            
            <div class="h-16 flex items-center justify-center border-b border-slate-100 dark:border-slate-600 overflow-hidden">
                <img src="{{ url_for('static', filename='img/hibiro150transp.png') }}" alt="Logo" class="min-w-[40px] w-10 h-auto">
            </div>
            
            <nav class="flex-grow overflow-y-auto py-4 space-y-2 px-3 custom-scrollbar">
                <a href="{{ url_for('site_bp.index') }}" 
                class="flex items-center gap-4 p-3 rounded-xl transition-all
                        text-slate-700 hover:bg-blue-50 
                        dark:text-white dark:hover:bg-slate-600">
                    <i class="fa-solid fa-house text-xl min-w-[32px] text-center text-blue-400"></i>
                    <span class="block md:hidden md:group-hover:block whitespace-nowrap font-black tracking-wide">
                        HOME
                    </span>
                </a>

                <a href="{{ url_for('site_bp.funcionalidades') }}" 
                class="flex items-center gap-4 p-3 rounded-xl transition-all
                        text-slate-700 hover:bg-blue-50 
                        dark:text-white dark:hover:bg-slate-600">
                    <i class="fa-solid fa-list-check text-xl min-w-[32px] text-center text-green-400"></i>
                    <span class="block md:hidden md:group-hover:block whitespace-nowrap font-black tracking-wide">
                        FUNCIONALIDADES
                    </span>
                </a>

                <a href="{{ url_for('site_bp.beneficios') }}" 
                class="flex items-center gap-4 p-3 rounded-xl transition-all
                        text-slate-700 hover:bg-blue-50 
                        dark:text-white dark:hover:bg-slate-600">
                    <i class="fa-solid fa-award text-xl min-w-[32px] text-center text-yellow-400"></i>
                    <span class="block md:hidden md:group-hover:block whitespace-nowrap font-black tracking-wide">
                        BENEFÍCIOS
                    </span>
                </a>
            </nav>

            <div class="p-3 border-t border-slate-100 dark:border-slate-600">
                <button onclick="toggleTheme()" 
                        class="w-full flex items-center gap-4 p-3 rounded-xl transition-all
                            text-slate-700 hover:bg-slate-100 
                            dark:text-white dark:hover:bg-slate-600">
                    <i id="theme-icon" class="fa-solid fa-sun text-xl min-w-[32px] text-center text-amber-400"></i>
                    <span class="block md:hidden md:group-hover:block whitespace-nowrap font-black tracking-wide">
                        ALTERNAR TEMA
                    </span>
                </button>
            </div>
        </aside>

        <main class="flex-grow flex flex-col min-w-0 overflow-hidden">
            
            <header class="h-16 bg-white/80 dark:bg-vscode-header backdrop-blur-md shadow-sm border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-6 flex-shrink-0">
                <div class="flex items-center gap-4">
                    <button onclick="toggleMobileMenu()" class="md:hidden text-slate-600 dark:text-slate-300 text-2xl hover:bg-slate-100 dark:hover:bg-slate-700 p-2 rounded-lg">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h2 class="text-sm font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Hibiro 2026</h2>
                </div>
                
                <div class="flex gap-4">
                    <a href="{{ url_for('auth.login') }}" class="px-4 py-2 border border-blue-600 text-blue-600 dark:text-blue-400 rounded-lg text-xs font-bold hover:bg-blue-50 transition">Login</a>
                    <a href="{{ url_for('site_bp.cadastro_teste_gratis') }}" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold shadow-md shadow-blue-500/20">Teste Grátis</a>
                </div>
            </header>

            <section class="flex-grow overflow-y-auto p-4 md:p-8">
                {% block content %}{% endblock %}
                
                <footer class="mt-20 py-10 border-t border-slate-200 dark:border-slate-800 text-center text-slate-400">
                    <p class="text-[10px] font-bold uppercase tracking-widest">&copy; 2026 Hibiro. Todos os direitos reservados.</p>
                </footer>
            </section>
        </main>
    </div>

    <script>
        // Abre e fecha a sidebar no mobile
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // Fecha a sidebar automaticamente se o usuário clicar em um link (útil para navegação mobile)
        document.querySelectorAll('#sidebar nav a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth < 768) { // Se for mobile
                    toggleMobileMenu();
                }
            });
        });

        // Controle de Tema
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme-site', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme-site', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme-site') || 'dark';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                const icon = document.getElementById('theme-icon');
                if(icon) icon.classList.replace('fa-moon', 'fa-sun');
            }
        });
    </script>
</body>
</html>
